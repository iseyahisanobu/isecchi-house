<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会社概要 | オウタム合同会社</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#eef5ff',
                            100: '#dbeafe',
                            200: '#93c5fd',
                            500: '#3b82f6',
                            700: '#0854AA',
                            800: '#054596',
                            900: '#043882',
                        },
                        accent: { yellow: '#F5C108' }
                    },
                    fontFamily: {
                        sans:    ['"Noto Sans JP"', 'sans-serif'],
                        heading: ['"Zen Maru Gothic"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3 { font-family: 'Zen Maru Gothic', sans-serif; }

        .bg-dots-blue {
            background-image: radial-gradient(circle, rgba(8,84,170,0.10) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        /* 代表者名は画像のため選択・コピー不可（検索避け） */
        .name-img { user-select: none; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- ナビゲーション（簡易） -->
    <header class="fixed w-full top-0 z-50 bg-brand-800 border-b border-brand-900 shadow-md h-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-white hover:text-yellow-200 transition">
                <i class="fa-solid fa-arrow-left text-sm"></i>
                <img src="画像素材/ロゴ_キャラクター/いせっちハウス_グループホーム_一行_透過.png"
                     alt="いせっちハウス" class="h-14 w-auto object-contain">
            </a>
        </div>
    </header>

    <!-- ページタイトル -->
    <section class="pt-24 pb-12 bg-brand-800 bg-dots-blue relative overflow-hidden">
        <!-- 背景装飾 -->
        <div class="absolute top-0 left-0 w-64 h-64 rounded-full opacity-10 pointer-events-none"
             style="background: radial-gradient(circle, #3b82f6, transparent);"></div>
        <div class="max-w-5xl mx-auto px-4 text-center relative z-10">
            <p class="text-brand-200 text-xs font-bold tracking-widest uppercase mb-2">Company Profile</p>
            <h1 class="text-3xl md:text-4xl font-bold text-white font-heading">会社概要</h1>
            <p class="text-brand-200 text-sm mt-3">オウタム合同会社 / Autumn LLC</p>
        </div>
    </section>

    <!-- 会社概要テーブル -->
    <section class="py-16 bg-white">
        <div class="max-w-3xl mx-auto px-4">
            <h2 class="text-2xl font-bold text-brand-900 mb-8 font-heading flex items-center gap-3">
                <span class="w-1 h-7 bg-brand-700 rounded-full block"></span>
                基本情報
            </h2>
            <table class="w-full border-collapse text-sm">
                <tbody>
                    <tr class="border-b border-gray-100">
                        <th class="py-4 pr-6 text-left text-brand-700 font-bold w-36 align-top whitespace-nowrap">会社名</th>
                        <td class="py-4 text-gray-700">オウタム合同会社</td>
                    </tr>
                    <tr class="border-b border-gray-100">
                        <th class="py-4 pr-6 text-left text-brand-700 font-bold align-top whitespace-nowrap">英語名称</th>
                        <td class="py-4 text-gray-700">Autumn LLC</td>
                    </tr>
                    <tr class="border-b border-gray-100">
                        <th class="py-4 pr-6 text-left text-brand-700 font-bold align-top whitespace-nowrap">所在地</th>
                        <td class="py-4 text-gray-700">
                            〒214-0001<br>
                            神奈川県川崎市多摩区菅仙谷三丁目
                        </td>
                    </tr>
                    <tr class="border-b border-gray-100">
                        <th class="py-4 pr-6 text-left text-brand-700 font-bold align-top whitespace-nowrap">資本金</th>
                        <td class="py-4 text-gray-700">50万円</td>
                    </tr>
                    <tr class="border-b border-gray-100">
                        <th class="py-4 pr-6 text-left text-brand-700 font-bold align-top whitespace-nowrap">登記日</th>
                        <td class="py-4 text-gray-700">令和4年8月1日</td>
                    </tr>

                    <tr class="border-b border-gray-100">
                        <th class="py-4 pr-6 text-left text-brand-700 font-bold align-top whitespace-nowrap">事業内容</th>
                        <td class="py-4 text-gray-700">障害者総合支援法に基づく、障害福祉サービス事業</td>
                    </tr>
                    <tr>
                        <th class="py-4 pr-6 text-left text-brand-700 font-bold align-middle whitespace-nowrap">代表社員</th>
                        <td class="py-4 align-middle">
                            <img src="画像素材/ロゴ_キャラクター/伊勢谷_サイン.jpg" alt="代表社員 伊勢谷能宣"
                                 style="height: 48px; width: auto; mix-blend-mode: multiply; display: block; margin-left: -10px;">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- 区切り波形 -->
    <div style="background:#fff; margin-bottom:-2px; overflow:hidden; line-height:0;">
        <svg viewBox="0 0 1440 50" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="50" style="display:block;width:100%;">
            <path d="M0 25 Q 360 50 720 25 Q 1080 0 1440 25 L1440 50 L0 50 Z" fill="#eef5ff"/>
        </svg>
    </div>


    <!-- フッター -->
    <footer class="bg-brand-900 text-white py-10 border-t border-brand-800">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <p class="text-xs text-gray-400 mb-1">障がい者グループホーム</p>
            <h4 class="font-bold text-lg mb-3">いせっちハウス</h4>
            <p class="text-xs text-gray-400 mb-1">運営：オウタム合同会社</p>
            <p class="text-xs text-gray-400 mb-5">〒214-0001 神奈川県川崎市多摩区菅仙谷三丁目</p>
            <p class="text-xs text-gray-500">&copy; 2026 Autumn LLC. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
